name: Build and ship

on:
  push:
    branches:
      - main

jobs:
  build_img:
    name: it is lego time
    runs-on: etmbp-buildx
    permissions:
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set img tag
        run: cat ./build/version.txt >> $GITHUB_ENV
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: zot.etmbp.lo
          username: ci
          password: ${{ secrets.ZOT_PASSWORD }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: zot.etmbp.lo/zelixplore/beep-bot
          tags: |
            type=raw,${{ env.IMG_TAG }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://localhost:1234
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Ship it
        if: ${{ false }}
        run: |
          helm upgrade --install beep-bot \
          --namespace beep \
          --create-namespace \
          --reuse-values \
          --set image.tag=${{ env.IMG_TAG }} \
          --values ./deploy/beep-bot/values.yaml \
          ./deploy/beep-bot
